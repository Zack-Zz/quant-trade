name: ci

on:
  push:
    branches: ["main", "dev/**"]
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: quant-research
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Test
        run: pytest -q

  java-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trade-executor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Test
        run: mvn -q test
      - name: Verify
        run: mvn -q verify
