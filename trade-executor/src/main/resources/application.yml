spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/quant_trade}
    username: ${DB_USER:quant}
    password: ${DB_PASSWORD:quant}
  flyway:
    enabled: true
    locations: classpath:db/migration

executor:
  market: CN-A
  rebalance: DAILY_CLOSE
  broker: ${BROKER_MODE:paper}
